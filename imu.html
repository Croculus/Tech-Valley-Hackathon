            window.addEventListener("deviceorientation", (event) => {
                // const ax = e.accelerationIncludingGravity.x;
                // const ay = e.accelerationIncludingGravity.y;
                alphaLabel.textContent = event.alpha.toFixed(2);
                alphaProgress.value = event.alpha / 360 * 100;
                betaLabel.textContent = event.beta.toFixed(2);
                betaProgress.value = (event.beta + 180) / 360 * 100;
                gammaLabel.textContent = event.gamma.toFixed(2);
                gammaProgress.value = (event.gamma + 90) / 180 * 100;
            });
