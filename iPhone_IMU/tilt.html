<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #111;
      color: #0f0;
      padding: 24px 16px;
      text-align: center;
    }
    h2 { font-size: 20px; margin-bottom: 4px; }
    #status { font-size: 13px; color: #888; margin-bottom: 16px; }
    #data   { font-size: 13px; color: #0af; margin-bottom: 20px; min-height: 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    #start-btn {
      background: #0f0;
      color: #111;
      font-size: 20px;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h2>🎮 Head Tilt Controller</h2>
  <p id="status">Tap START to connect</p>
  <p id="data">--</p>

  <button id="start-btn" class="btn" onclick="start()">START</button>

<script>
  const WS_URL = "wss://10.90.111.57:8765";
  let ws;

  function start() {
    document.getElementById('status').innerText = "Connecting...";
    try {
      ws = new WebSocket(WS_URL);
      ws.onopen  = () => {
        document.getElementById('status').innerText = "✅ Connected!";
        document.getElementById('start-btn').style.display = 'none';
      };
      ws.onerror = () => document.getElementById('status').innerText = "❌ Connection failed";
      ws.onclose = (e) => document.getElementById('status').innerText = `❌ Closed (${e.code})`;
    } catch(e) {
      document.getElementById('status').innerText = "❌ " + e.message;
    }

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => {
        if (r === 'granted') listenToTilt();
      });
    } else {
      listenToTilt();
    }
  }

  function listenToTilt() {
    window.addEventListener('deviceorientation', (e) => {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
          beta:  e.beta,
          gamma: e.gamma,
        }));
        document.getElementById('data').innerText =
          `Pitch: ${e.beta?.toFixed(1)}°  Roll: ${e.gamma?.toFixed(1)}°`;
      }
    });
  }
</script>
</body>
</html>
