<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #111;
      color: #0f0;
      padding: 24px 16px;
      text-align: center;
    }

    h2 { font-size: 20px; margin-bottom: 4px; }
    #status { font-size: 13px; color: #888; margin-bottom: 16px; }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #connect-btn {
      background: #0f0;
      color: #111;
      font-size: 20px;
      padding: 20px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin: 24px 0 12px;
    }

    /* DPAD */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 240px;
      margin: 0 auto 20px;
    }

    .dpad-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #0f0;
      font-size: 22px;
      padding: 18px 0;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dpad-btn:active { background: #2a2a2a; }
    .dpad-btn.selecting {
      border-color: #0f0;
      background: #1a2a1a;
      box-shadow: 0 0 12px rgba(0,255,0,0.3);
    }

    .dpad-empty { background: transparent; border: none; }

    .key-label {
      font-size: 11px;
      color: #0af;
      font-family: monospace;
    }

    /* ACTION BUTTONS */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 300px;
      margin: 0 auto 10px;
    }

    .action-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #0f0;
      font-size: 14px;
      font-weight: bold;
      padding: 14px 0 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: background 0.1s;
    }

    .action-btn:active { background: #2a2a2a; }
    .action-btn.selecting {
      border-color: #0f0;
      background: #1a2a1a;
      box-shadow: 0 0 12px rgba(0,255,0,0.3);
    }

    /* SENSOR ROW */
    .sensor-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 300px;
      margin: 0 auto 8px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .sensor-row:active { background: #2a2a2a; }
    .sensor-row.selecting {
      border-color: #fa0;
      background: #1a1800;
      box-shadow: 0 0 12px rgba(255,170,0,0.3);
    }

    .sensor-label {
      font-size: 13px;
      color: #fa0;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sensor-key-label {
      font-size: 11px;
      color: #0af;
      font-family: monospace;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }

    .modal.open { display: flex; }

    .modal h3 {
      font-size: 16px;
      letter-spacing: 2px;
      color: #0f0;
    }

    .modal h3.sensor-title { color: #fa0; }
    .modal p { font-size: 13px; color: #888; }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 320px;
    }

    .action-key-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 300px;
    }

    .key-opt {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: monospace;
      padding: 14px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }

    .key-opt:active, .key-opt.selected {
      background: #0f0;
      color: #111;
      border-color: #0f0;
    }

    .key-opt.sensor-opt:active, .key-opt.sensor-opt.selected {
      background: #fa0;
      color: #111;
      border-color: #fa0;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid #555;
      color: #888;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    /* SLIDER */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .slider-row label {
      font-size: 13px;
      color: #888;
      width: 90px;
      text-align: left;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      accent-color: #0f0;
    }

    .slider-val {
      font-family: monospace;
      font-size: 13px;
      color: #0f0;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    #send-status {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <h2>⚙️ Tilt Controller — Config</h2>
  <p id="status">Tap CONNECT to begin</p>

  <button id="connect-btn" class="btn" onclick="connect()">CONNECT</button>

  <!-- REMAP DIRECTIONS -->
  <div class="section-title">Remap Directions</div>
  <div class="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-up" onclick="openRemap('up')">
      ▲ <span class="key-label" id="label-up">W</span>
    </div>
    <div class="dpad-empty"></div>

    <div class="dpad-btn" id="btn-left" onclick="openRemap('left')">
      ◀ <span class="key-label" id="label-left">A</span>
    </div>
    <div class="dpad-empty" style="display:flex;align-items:center;justify-content:center;color:#333;font-size:20px">⊙</div>
    <div class="dpad-btn" id="btn-right" onclick="openRemap('right')">
      ▶ <span class="key-label" id="label-right">D</span>
    </div>

    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-down" onclick="openRemap('down')">
      ▼ <span class="key-label" id="label-down">S</span>
    </div>
    <div class="dpad-empty"></div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="section-title">Action Buttons</div>
  <div class="action-grid">
    <div class="action-btn" id="abtn-jump" onclick="openActionRemap('jump')">
      🦘 JUMP
      <span class="key-label" id="alabel-jump">SPACE</span>
    </div>
    <div class="action-btn" id="abtn-go" onclick="openActionRemap('go')">
      🟢 GO
      <span class="key-label" id="alabel-go">ENTER</span>
    </div>
    <div class="action-btn" id="abtn-run" onclick="openActionRemap('run')">
      ⚡ RUN
      <span class="key-label" id="alabel-run">SHIFT</span>
    </div>
    <div class="action-btn" id="abtn-click" onclick="openActionRemap('click')">
      🖱️ CLICK
      <span class="key-label" id="alabel-click">CLICK</span>
    </div>
  </div>

  <!-- SENSOR -->
  <div class="section-title">Sensor</div>
  <div class="sensor-row" id="abtn-sensor" onclick="openActionRemap('sensor')">
    <span class="sensor-label">⚡ SENSOR TRIGGER</span>
    <span class="sensor-key-label" id="alabel-sensor">C</span>
  </div>

  <!-- THRESHOLD -->
  <div class="section-title">Sensitivity</div>
  <div class="slider-row">
    <label>Tilt Angle</label>
    <input type="range" min="5" max="45" value="12" id="thresh-slider"
      oninput="updateThreshold(this.value)">
    <span class="slider-val" id="thresh-val">12°</span>
  </div>

  <p id="send-status"></p>

  <!-- DIRECTION REMAP MODAL -->
  <div class="modal" id="remap-modal">
    <h3>REMAP <span id="remap-dir-label">UP</span></h3>
    <p>Choose a key to assign:</p>
    <div class="key-grid" id="key-grid"></div>
    <button class="cancel-btn" onclick="closeRemap()">Cancel</button>
  </div>

  <!-- ACTION REMAP MODAL -->
  <div class="modal" id="action-modal">
    <h3 id="action-modal-title">REMAP JUMP</h3>
    <p>Choose an action to assign:</p>
    <div class="action-key-grid" id="action-key-grid"></div>
    <button class="cancel-btn" onclick="closeActionRemap()">Cancel</button>
  </div>

<script>
  const WS_URL = "wss://10.90.111.57:8765";
  let ws;
  const keyMap    = { up: 'w', down: 's', left: 'a', right: 'd' };
  const actionMap = { jump: 'space', go: 'enter', run: 'shift', click: 'click', sensor: 'c' };
  let threshold = 12;
  let remapTarget = null;
  let actionRemapTarget = null;

  const KEY_OPTIONS = [
    'w','a','s','d',
    '↑','↓','←','→',
    ' ','z','x','c',
    '1','2','3','4',
  ];

  const KEY_SEND = {
    '↑': 'ArrowUp', '↓': 'ArrowDown',
    '←': 'ArrowLeft', '→': 'ArrowRight',
    ' ': 'space',
  };

  const ACTION_OPTIONS = [
    { label: 'click',     value: 'click'     },
    { label: 'enter',     value: 'enter'     },
    { label: 'space',     value: 'space'     },
    { label: 'escape',    value: 'escape'    },
    { label: 'backspace', value: 'backspace' },
    { label: 'shift',     value: 'shift'     },
  ];

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connect() {
    document.getElementById('status').innerText = "Connecting...";
    try {
      ws = new WebSocket(WS_URL);
      ws.onopen  = () => {
        document.getElementById('status').innerText = "✅ Connected!";
        document.getElementById('connect-btn').style.display = 'none';
        sendConfig();
      };
      ws.onerror = () => document.getElementById('status').innerText = "❌ Connection failed";
      ws.onclose = (e) => document.getElementById('status').innerText = `❌ Closed (${e.code})`;
    } catch(e) {
      document.getElementById('status').innerText = "❌ " + e.message;
    }
  }

  function sendConfig() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type:      'config',
        keyMap,
        threshold,
        actionMap,
        esp_key:   actionMap.sensor,
      }));
      const s = document.getElementById('send-status');
      s.innerText = "✓ Config sent";
      setTimeout(() => s.innerText = '', 1500);
    }
  }

  // ── Threshold ──────────────────────────────────────────────────────────────
  function updateThreshold(val) {
    threshold = +val;
    document.getElementById('thresh-val').innerText = val + '°';
    sendConfig();
  }

  // ── Direction Remap ────────────────────────────────────────────────────────
  function openRemap(dir) {
    remapTarget = dir;
    document.getElementById('remap-dir-label').innerText = dir.toUpperCase();

    const grid = document.getElementById('key-grid');
    grid.innerHTML = '';
    KEY_OPTIONS.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key-opt';
      btn.textContent = k;
      if ((KEY_SEND[k] || k) === keyMap[dir]) btn.classList.add('selected');
      btn.onclick = () => assignKey(k);
      grid.appendChild(btn);
    });

    document.getElementById('remap-modal').classList.add('open');
    document.getElementById('btn-' + dir).classList.add('selecting');
  }

  function assignKey(k) {
    const actual = KEY_SEND[k] || k;
    keyMap[remapTarget] = actual;
    document.getElementById('label-' + remapTarget).innerText = k.toUpperCase();
    closeRemap();
    sendConfig();
  }

  function closeRemap() {
    document.getElementById('remap-modal').classList.remove('open');
    if (remapTarget) document.getElementById('btn-' + remapTarget).classList.remove('selecting');
    remapTarget = null;
  }

  // ── Action Remap ───────────────────────────────────────────────────────────
  function openActionRemap(action) {
    actionRemapTarget = action;
    const isSensor = action === 'sensor';

    const title = document.getElementById('action-modal-title');
    title.textContent = 'REMAP ' + action.toUpperCase();
    title.className = isSensor ? 'sensor-title' : '';

    const grid = document.getElementById('action-key-grid');
    grid.innerHTML = '';
    ACTION_OPTIONS.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'key-opt' + (isSensor ? ' sensor-opt' : '');
      btn.textContent = opt.label;
      if (opt.value === actionMap[action]) btn.classList.add('selected');
      btn.onclick = () => assignActionKey(opt.value, opt.label);
      grid.appendChild(btn);
    });

    document.getElementById('action-modal').classList.add('open');
    document.getElementById('abtn-' + action).classList.add('selecting');
  }

  function assignActionKey(value, label) {
    actionMap[actionRemapTarget] = value;
    document.getElementById('alabel-' + actionRemapTarget).innerText = label.toUpperCase();
    closeActionRemap();
    sendConfig();
  }

  function closeActionRemap() {
    document.getElementById('action-modal').classList.remove('open');
    if (actionRemapTarget) {
      document.getElementById('abtn-' + actionRemapTarget).classList.remove('selecting');
    }
    actionRemapTarget = null;
  }
</script>
</body>
</html>
